server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets: long-lived cache (filenames are content-hashed by Vite)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Security headers (OWASP LLM05 Improper Output Handling: a strict CSP is
    # the browser-side backstop should any model-derived content ever reach the
    # DOM unescaped). connect/frame allowances cover MSAL's Entra ID flows.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://login.microsoftonline.com; frame-src https://login.microsoftonline.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
}
