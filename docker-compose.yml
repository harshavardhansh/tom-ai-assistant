# Local development stack.
# By default the backend runs against Neo4j + Redis. To run it fully offline
# instead (no databases), set GRAPH_BACKEND=memory and CACHE_BACKEND=memory.
services:
  neo4j:
    image: neo4j:5.24-community
    environment:
      NEO4J_AUTH: neo4j/devpassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: dev
      GRAPH_BACKEND: neo4j
      VECTOR_BACKEND: local
      CACHE_BACKEND: redis
      AUTH_DISABLED: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: devpassword
      REDIS_URL: redis://redis:6379/0
      # Set these to enable real AI (otherwise deterministic fallbacks are used):
      WORKBENCH_OPENAI_BASE_URL: ${WORKBENCH_OPENAI_BASE_URL:-}
      WORKBENCH_OPENAI_API_KEY: ${WORKBENCH_OPENAI_API_KEY:-}
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      # Proxy target inside the compose network.
      VITE_API_PROXY: http://backend:8000
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"

volumes:
  neo4j-data:
